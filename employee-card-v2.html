<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Adam Maulana Hafiz — PKP</title>
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --green: oklch(38% 0.064 165);
                --green-mid: oklch(48% 0.072 165);
                --green-light: #e1f5ee;
                --gold: oklch(72% 0.1 80);
                --white: #ffffff;
                --bg: #edecea;
                --gray-300: #c8c7c3;
                --gray-400: #9a9993;
                --gray-900: #1a1a18;
            }

            body {
                min-height: 100vh;
                background: var(--bg);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "DM Sans", sans-serif;
                padding: 2rem 1rem;
            }

            /* ── PHONE SHELL ── */
            .shell {
                width: 320px;
                background: #e8e6e3;
                border-radius: 44px;
                padding: 10px;
                box-shadow:
                    0 0 0 1px rgba(0, 0, 0, 0.08),
                    0 32px 64px rgba(0, 0, 0, 0.18),
                    inset 0 1px 0 rgba(255, 255, 255, 0.6);
            }

            /* ── CARD ── */
            .card {
                width: 100%;
                border-radius: 36px;
                overflow: hidden;
                background: var(--white);
                animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
            }
            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(20px) scale(0.97);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            /* ── PHOTO AREA ── */
            .photo-area {
                position: relative;
                height: 300px;
                background: linear-gradient(160deg, #d5ede6 0%, #c2dbd4 100%);
                overflow: hidden;
            }

            /* placeholder person silhouette */
            .photo-placeholder {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: flex-end;
                justify-content: center;
            }
            .silhouette {
                width: 200px;
                height: 260px;
                background: linear-gradient(180deg, #a8ccc4 0%, #85b5ab 100%);
                border-radius: 100px 100px 0 0;
                position: relative;
                bottom: 0;
            }
            .silhouette::before {
                content: "";
                position: absolute;
                top: -50px;
                left: 50%;
                transform: translateX(-50%);
                width: 90px;
                height: 90px;
                background: #a8ccc4;
                border-radius: 50%;
            }

            /* brand chip top-left */
            .brand-chip {
                position: absolute;
                top: 16px;
                left: 16px;
                display: flex;
                align-items: center;
                gap: 7px;
                background: rgba(255, 255, 255, 0.82);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                border-radius: 99px;
                padding: 6px 12px 6px 8px;
                border: 0.5px solid rgba(255, 255, 255, 0.9);
            }
            .chip-icon {
                width: 22px;
                height: 22px;
                background: var(--green);
                border-radius: 6px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .chip-icon svg {
                width: 13px;
                height: 13px;
                fill: var(--gold);
            }
            .chip-label {
                font-size: 10px;
                font-weight: 500;
                color: var(--green);
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }

            /* employee id chip top-right */
            .id-chip {
                position: absolute;
                top: 16px;
                right: 16px;
                background: var(--green);
                color: var(--gold);
                font-size: 10px;
                font-weight: 500;
                padding: 5px 10px;
                border-radius: 99px;
                letter-spacing: 0.06em;
            }

            /* photo gradient fade into white */
            .photo-fade {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 80px;
                background: linear-gradient(
                    to bottom,
                    transparent,
                    var(--white)
                );
            }

            /* ── BODY ── */
            .card-body {
                padding: 4px 22px 22px;
            }

            .name-row {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 16px;
            }
            .emp-name {
                font-family: "DM Serif Display", serif;
                font-size: 22px;
                color: var(--gray-900);
                letter-spacing: -0.3px;
            }
            .verified {
                width: 22px;
                height: 22px;
                background: var(--green);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .verified svg {
                width: 12px;
                height: 12px;
                stroke: white;
                fill: none;
                stroke-width: 2.5;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            .spacer {
                flex: 1;
            }

            /* ── INFO PILLS ── */
            .info-pills {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .pill-row {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 14px;
                background: #f6f5f2;
                border-radius: 14px;
                transition: background 0.15s;
                cursor: default;
            }
            .pill-row:hover {
                background: #eeede9;
            }
            .pill-icon {
                width: 30px;
                height: 30px;
                border-radius: 8px;
                background: var(--green-light);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .pill-icon svg {
                width: 15px;
                height: 15px;
                stroke: var(--green);
                fill: none;
                stroke-width: 1.8;
                stroke-linecap: round;
                stroke-linejoin: round;
            }
            .pill-meta {
                flex: 1;
                min-width: 0;
            }
            .pill-label {
                font-size: 10px;
                font-weight: 500;
                color: var(--gray-400);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .pill-value {
                font-size: 13px;
                color: var(--gray-900);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .pill-value.accent {
                color: var(--green-mid);
            }
        </style>
    </head>
    <body>
        <div class="shell">
            <div class="card">
                <!-- PHOTO AREA -->
                <div class="photo-area">
                    <div class="photo-placeholder">
                        <div class="silhouette"></div>
                    </div>

                    <div class="brand-chip">
                        <div class="chip-icon">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M2 19h20M3 8l4 5 5-8 5 8 4-5-2 11H5L3 8z"
                                />
                            </svg>
                        </div>
                        <span class="chip-label">PKP</span>
                    </div>

                    <div class="id-chip">PKP-001</div>

                    <div class="photo-fade"></div>
                </div>

                <!-- BODY -->
                <div class="card-body">
                    <div class="name-row">
                        <h1 class="emp-name">Adam Maulana Hafiz</h1>
                        <div class="verified">
                            <svg viewBox="0 0 24 24">
                                <polyline points="20 6 9 17 4 12" />
                            </svg>
                        </div>
                    </div>

                    <!-- INFO PILLS -->
                    <div class="info-pills">
                        <div class="pill-row">
                            <div class="pill-icon">
                                <svg viewBox="0 0 24 24">
                                    <rect
                                        x="2"
                                        y="7"
                                        width="20"
                                        height="14"
                                        rx="2"
                                    />
                                    <path
                                        d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"
                                    />
                                </svg>
                            </div>
                            <div class="pill-meta">
                                <div class="pill-label">Jabatan</div>
                                <div class="pill-value">
                                    Staff — Divisi Legal
                                </div>
                            </div>
                        </div>

                        <div class="pill-row">
                            <div class="pill-icon">
                                <svg viewBox="0 0 24 24">
                                    <rect
                                        x="2"
                                        y="4"
                                        width="20"
                                        height="16"
                                        rx="2"
                                    />
                                    <path
                                        d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"
                                    />
                                </svg>
                            </div>
                            <div class="pill-meta">
                                <div class="pill-label">Email</div>
                                <div class="pill-value accent">
                                    adam@presisikonsulindoprima.com
                                </div>
                            </div>
                        </div>

                        <div class="pill-row">
                            <div class="pill-icon">
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.04z"
                                    />
                                </svg>
                            </div>
                            <div class="pill-meta">
                                <div class="pill-label">No. Telpon</div>
                                <div class="pill-value">0811 222 1212</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function saveContact() {
                const vcard = [
                    "BEGIN:VCARD",
                    "VERSION:3.0",
                    "FN:Adam Maulana Hafiz",
                    "ORG:PT Presisi Konsulindo Prima;Legal",
                    "TITLE:Staff",
                    "EMAIL:adam@presisikonsulindoprima.com",
                    "TEL:08112221212",
                    "END:VCARD",
                ].join("\n");
                const blob = new Blob([vcard], { type: "text/vcard" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "adam-maulana-hafiz.vcf";
                a.click();
            }
        </script>
    </body>
</html>
